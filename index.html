<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <meta name="description" content="Harem Clicker Infinity - Anime Gacha Idle Game" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="format-detection" content="telephone=no" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Harem Clicker Infinity</title>

    <script>
      // Детект Yandex Games iframe и установка CSS-переменных для баннеров
      (function () {
        try {
          // Проверяем что мы в iframe
          if (window.self !== window.top) {
            document.documentElement.classList.add("yandex-games-frame");

            // Слушаем сообщения от YG SDK о баннерах
            window.addEventListener("message", function (e) {
              if (e.data && e.data.type === "yg-banner") {
                const root = document.documentElement;
                if (e.data.position === "top") {
                  root.style.setProperty("--yg-banner-top", e.data.height + "px");
                }
                if (e.data.position === "bottom") {
                  root.style.setProperty("--yg-banner-bottom", e.data.height + "px");
                }
              }
            });
          }

          // Детект мобильных устройств
          const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
          if (isMobile) {
            document.documentElement.classList.add("mobile-device");
          }

          // Детект iOS
          const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
          if (isIOS) {
            document.documentElement.classList.add("ios-device");
          }
        } catch (e) {
          console.log("[Init] Detection failed:", e);
        }
      })();
    </script>

    <!-- Yandex Games SDK -->
    <script src="https://yandex.ru/games/sdk/v2"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
